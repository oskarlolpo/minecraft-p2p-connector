name: cloudflare-turn-worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/cloudflare-turn-worker/**"
      - ".github/workflows/cloudflare-turn-worker.yml"

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: apps/cloudflare-turn-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/cloudflare-turn-worker/package.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: npm install

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TURN_KEY_ID: ${{ secrets.TURN_KEY_ID }}
          TURN_KEY_API_TOKEN: ${{ secrets.TURN_KEY_API_TOKEN }}
        run: |
          echo "$TURN_KEY_ID" | npx wrangler secret put TURN_KEY_ID
          echo "$TURN_KEY_API_TOKEN" | npx wrangler secret put TURN_KEY_API_TOKEN
          npx wrangler deploy
