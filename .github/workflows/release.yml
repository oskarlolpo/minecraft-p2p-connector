name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync app version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content package.json -Raw) -replace '"version":\s*"[^"]+"', "`"version`": `"$version`"" | Set-Content package.json
          (Get-Content src-tauri/Cargo.toml -Raw) -replace '(?m)^version = ".*"$', "version = `"$version`"" | Set-Content src-tauri/Cargo.toml
          (Get-Content src-tauri/tauri.conf.json -Raw) -replace '"version":\s*"[^"]+"', "`"version`": `"$version`"" | Set-Content src-tauri/tauri.conf.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri bundle
        run: npm run tauri build -- --bundles nsis,msi
        env:
          CI: true

      - name: Create Release and Upload Assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          $repo = "oskarlolpo/minecraft-p2p-connector"
          $tag = "${{ github.ref_name }}"
          
          # Проверяем, существует ли релиз. Если нет - создаем.
          $releaseExists = gh release view $tag --repo $repo 2>$null
          if (-not $releaseExists) {
              gh release create $tag --repo $repo --title "Minecraft P2P Connector $tag" --notes "Direct UDP hole-punching Minecraft Java connector for Windows." --target main
          }

          # Загружаем все файлы из папки bundle
          Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe", "src-tauri/target/release/bundle/msi/*.msi" | ForEach-Object {
              gh release upload $tag $_.FullName --repo $repo --clobber
          }
